# mkdocs.yaml
site_name: Full Calendar Remastered
repo_url: https://github.com/YouFoundJK/plugin-full-calendar
repo_name: YouFoundJK/plugin-full-calendar
theme:
    name: material
    custom_dir: docs/overrides
    logo: assets/branding/icon-light.png
    favicon: assets/branding/icon-dark.png
    icon:
        repo: fontawesome/brands/square-github
    font:
        text: Work Sans
    features:
        - navigation.instant
        - navigation.indexes
        - navigation.tabs
        - navigation.tabs.sticky
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: white
          accent: light blue
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: black
          accent: blue grey
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
markdown_extensions:
    - toc:
          permalink: true
    - admonition # Add admonition for notes and warnings
    - attr_list

extra_javascript:
    - assets/javascripts/nav-section-links.js
    - assets/javascripts/theme-logo.js

extra_css:
      - assets/stylesheets/site-polish.css
      - assets/stylesheets/nav-section-links.css
      - assets/stylesheets/custom-footer.css

nav:
    - Home: 
          - index.md
          - What's New: whats_new.md
          - Changelog: changelog.md
    - User Docs:
          - user/index.md
          - Onboarding and Daily Use:
                - user/guides/index.md
                - Getting Started: getting_started.md
                - Commands and Shortcuts: user/guides/commands-and-shortcuts.md
                - Interactions and Gestures: user/guides/interactions.md
                - Reminders and Notifications: user/guides/reminders.md
                - Quick Workflows: user/guides/quick-workflows.md
          - Calendar Types:
                - user/calendars/index.md
                - Full Note Calendar: user/calendars/local.md
                - Daily Note Calendar: user/calendars/dailynote.md
                - ICS (Remote and Local): user/calendars/ics.md
                - CalDAV: user/calendars/caldav.md
                - Google Calendar: user/calendars/gcal.md
                - Obsidian Bases Calendar: user/calendars/bases.md
                - Tasks Plugin Integration: user/calendars/tasks-plugin-integration.md
                - ActivityWatch Integration: user/calendars/activitywatch.md
                - Dataview Integration: user/calendars/dataview.md
          - Working with Events:
                - user/events/index.md
                - Event Management: user/events/manage.md
                - Recurring Events: user/events/recurring.md
                - Tasks: user/events/tasks.md
                - Category Coloring: user/events/categories.md
                - Timezone Support: user/events/timezones.md
                - Hover and Context Menu: user/events/hover_context.md
          - Views:
                - user/views/index.md
                - Workspaces: user/views/workspaces.md
                - Timeline View Usage: user/views/timeline_view.md
          - Chrono Analyser: 
                - user/chrono_analyser/index.md
                - Introduction: user/chrono_analyser/introduction.md
                - Use Cases: user/chrono_analyser/usecases.md
                - FAQ: user/chrono_analyser/faq.md
          - Settings and Customization:
                - user/settings/index.md
                - Calendar Sources: user/settings/sources.md
                - Display and Behavior: user/settings/fc_config.md
          - Troubleshooting: user/guides/troubleshooting.md
    - Architecture Docs:
          - architecture/system/index.md
          - System:
                - architecture/system/overview.md
                - Events Architecture: architecture/events/architecture.md
                - EventCache Contract: architecture/system/eventcache.md
                - Event Storage and Identifiers: architecture/system/event-storage.md
                - FullCalendar Interop: architecture/system/interop.md
                - Data Flow: architecture/system/data-flow.md
                - Core Systems: architecture/system/core-systems.md
                - Extending the Plugin: architecture/system/extending.md
                - Testing and Validation: architecture/system/testing.md
          - Provider Architecture:
                - architecture/calendars/architecture.md
                - Implementations and Patches: architecture/calendars/provider-implementations.md
                - New Provider Blueprint: architecture/calendars/provider-blueprint.md
          - Features:
                - architecture/system/features/index.md
                - Settings Architecture: architecture/settings/architecture.md
                - Timezone Architecture: architecture/system/features/timezone-architecture.md
                - Reminders Architecture: architecture/system/features/reminders-architecture.md
                - ActivityWatch Architecture: architecture/activitywatch/index.md
                - ActivityWatch Implementation: architecture/activitywatch/implementation.md
          - Views Architecture:
                - architecture/views/architecture.md
          - ChronoAnalyser:
                - architecture/chrono_analyser/architecture.md
                - Analysis Types Implementation: architecture/chrono_analyser/analysis-types.md
                - Insights Engine Implementation: architecture/chrono_analyser/insights-architecture.md
          - Dev Logs:
                - architecture/dev-logs/index.md
                - Calendar Load Profiling Audit: architecture/dev-logs/devlog_calendar_load_profiling_2026-04-11.md
                - RRULE Timezone Date-Shift Fix: architecture/dev-logs/devlog_rrule_timezone_patch.md
    - Reference:
