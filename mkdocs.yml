# mkdocs.yaml
site_name: Full Calendar Remastered
repo_url: https://github.com/YouFoundJK/plugin-full-calendar
repo_name: YouFoundJK/plugin-full-calendar
theme:
    name: material
    custom_dir: docs/overrides
    logo: assets/branding/icon-light.png
    favicon: assets/branding/icon-dark.png
    icon:
        repo: fontawesome/brands/square-github
    font:
        text: Work Sans
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.indexes
        - navigation.tabs
        - navigation.tabs.sticky
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy
        - content.code.select
        - content.code.annotate
        - content.tool.feedback
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: white
          accent: light blue
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: black
          accent: blue grey
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
markdown_extensions:
    - toc:
          permalink: true
    - admonition
    - pymdownx.details
    - pymdownx.superfences:
          custom_fences:
            - name: mermaid
              class: mermaid
              format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.tabbed:
          alternate_style: true
    - pymdownx.tasklist:
          custom_checkbox: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.keys
    - pymdownx.caret
    - attr_list

extra_javascript:
    - assets/javascripts/nav-section-links.js
    - assets/javascripts/theme-logo.js

extra_css:
      - assets/stylesheets/site-polish.css
      - assets/stylesheets/nav-section-links.css
      - assets/stylesheets/custom-footer.css

plugins:
    - search
    - git-revision-date-localized:
          enable_creation_date: true
          type: datetime
    - git-committers:
          repository: YouFoundJK/plugin-full-calendar
          branch: main

extra:
    analytics:
        provider: google
        property: G-X3N9HF1H5Y
        feedback:
            title: Was this page helpful?
            ratings:
                - icon: material/emoticon-happy-outline
                  name: This page was helpful
                  data: 1
                  note: >-
                    Thanks for your feedback!
                - icon: material/emoticon-sad-outline
                  name: This page was not helpful
                  data: 0
                  note: >-
                    Thanks for your feedback!


