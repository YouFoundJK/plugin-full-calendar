name: Check
on:
    - push
jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
              with:
                  ref: ${{ github.head_ref }}
            - uses: actions/setup-node@v2
              with:
                  node-version: "20.x"
            - uses: pnpm/action-setup@v2
              with:
                  version: 11
            - run: pnpm install --no-frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run compile
    tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
              with:
                  ref: ${{ github.head_ref }}
            - uses: actions/setup-node@v2
              with:
                  node-version: "20.x"
            - uses: pnpm/action-setup@v2
              with:
                  version: 11
            - run: pnpm install --no-frozen-lockfile
            - run: pnpm run test-update
